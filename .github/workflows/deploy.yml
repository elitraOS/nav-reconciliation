name: CD — Deploy to ECS Fargate

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"
  AWS_ACCOUNT_ID: "692859939200"
  ECR_REPOSITORY: "nav-reconciliation-production"
  ECS_CLUSTER: "nav-reconciliation-production"
  ECS_SERVICE: "nav-reconciliation-production"
  ECS_TASK_FAMILY: "nav-reconciliation-production"
  DEPLOYMENT_URL: "http://nav-reconciliation-production-1316765472.us-east-1.elb.amazonaws.com"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
      task-definition: ${{ steps.get-task-def.outputs.task-definition }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          BACKEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG"
          docker build -f docker/backend.Dockerfile -t "$BACKEND_IMAGE" .
          docker tag "$BACKEND_IMAGE" "$ECR_REGISTRY/$ECR_REPOSITORY:backend-latest"
          docker push "$BACKEND_IMAGE"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:backend-latest"
          echo "image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push frontend image
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FRONTEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG"
          docker build -f docker/frontend.Dockerfile -t "$FRONTEND_IMAGE" .
          docker tag "$FRONTEND_IMAGE" "$ECR_REGISTRY/$ECR_REPOSITORY:frontend-latest"
          docker push "$FRONTEND_IMAGE"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:frontend-latest"
          echo "image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        id: get-task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query taskDefinition \
            > task-definition.json
          echo "task-definition=task-definition.json" >> "$GITHUB_OUTPUT"

      - name: Update backend image in task definition
        id: update-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.get-task-def.outputs.task-definition }}
          container-name: backend
          image: ${{ steps.build-backend.outputs.image }}

      - name: Update frontend image in task definition
        id: update-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.update-backend.outputs.task-definition }}
          container-name: frontend
          image: ${{ steps.build-frontend.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Wait for service to be healthy
        run: sleep 30

      - name: Smoke check deployment
        env:
          DEPLOYMENT_URL: "http://nav-reconciliation-production-1316765472.us-east-1.elb.amazonaws.com"
        run: |
          echo "Checking $DEPLOYMENT_URL..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOYMENT_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed!"
              exit 0
            fi
            sleep 15
          done
          echo "Smoke test failed after 5 attempts"
          exit 1
